<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg-color: #242733;
      --text-color: #FFFFFF;
      --input-bg: #2d3142;
      --input-border: #454d66;
      --status-color: #a0a0a0;
    }

    /* When the script detects light mode, it will apply this class */
    :root.light-mode {
      --bg-color: #FFFFFF;
      --text-color: #212529;
      --input-bg: #F8F9FA;
      --input-border: #DEE2E6;
      --status-color: #6C757D;
    }
    body {
      background-color: var(--bg-color); 
      color: var(--text-color);
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
    }
    #status {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      color: var(--status-color);
      font-weight: 600;
    }
    .input-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    input {
      background-color: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 4px;
      color: var(--text-color);
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #714B67;
    }
    button {
      background-color: #714B67;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover { background-color: #5a3c52; }
    button:active { transform: translateY(1px); }
    button:disabled { background-color: #454d66; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="status">Getting boundary...</div>
  <div class="input-container">
    <input type="text" id="idValue" placeholder="Boundary" spellcheck="false">
    <button id="searchBtn">Search</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
